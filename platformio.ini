; Master Caution Annunciator — PlatformIO project config
;
; Two environments:
;   teensy41  — production firmware build for Teensy 4.1
;   host      — native build on Linux for Unity unit tests of portable logic
;
; Per-env build_src_filter excludes the wrong HAL impl from each build.

[platformio]
default_envs = teensy41

[env]
build_flags = -Wall -Wextra -Wpedantic -Wno-unused-parameter

[env:teensy41]
platform         = teensy
framework        = arduino
board            = teensy41
build_flags      = ${env.build_flags} -DAUDIO_BLOCK_SAMPLES=128
build_src_filter = +<*> -<hal_host/>
monitor_speed    = 115200
upload_protocol  = teensy-cli

[env:host]
platform         = native
test_framework   = unity
build_flags      = ${env.build_flags} -DHAL_HOST=1 -g -O0
build_src_filter = +<hal_host/> -<main.cpp> -<hal_teensy/>
